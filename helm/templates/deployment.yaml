apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logflare.fullname" . }}
  labels:
    {{- include "logflare.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "logflare.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "logflare.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "logflare.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.logflare.grpcPort }}
              protocol: TCP
          env:
            {{- if .Values.logflare.nodeHost }}
            - name: LOGFLARE_NODE_HOST
              value: {{ .Values.logflare.nodeHost | quote }}
            {{- else }}
            - name: LOGFLARE_NODE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.publicAccessToken "envName" "LOGFLARE_PUBLIC_ACCESS_TOKEN" "defaultKey" "LOGFLARE_PUBLIC_ACCESS_TOKEN") | nindent 12 }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.privateAccessToken "envName" "LOGFLARE_PRIVATE_ACCESS_TOKEN" "defaultKey" "LOGFLARE_PRIVATE_ACCESS_TOKEN") | nindent 12 }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.dbPassword "envName" "DB_PASSWORD" "defaultKey" "DB_PASSWORD") | nindent 12 }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.dbEncryptionKey "envName" "LOGFLARE_DB_ENCRYPTION_KEY" "defaultKey" "LOGFLARE_DB_ENCRYPTION_KEY") | nindent 12 }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.phxSecretKeyBase "envName" "PHX_SECRET_KEY_BASE" "defaultKey" "PHX_SECRET_KEY_BASE") | nindent 12 }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.phxLiveViewSigningSalt "envName" "PHX_LIVE_VIEW_SIGNING_SALT" "defaultKey" "PHX_LIVE_VIEW_SIGNING_SALT") | nindent 12 }}
            {{- if eq .Values.logflare.backend.type "postgres" }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.postgresBackendUrl "envName" "POSTGRES_BACKEND_URL" "defaultKey" "POSTGRES_BACKEND_URL") | nindent 12 }}
            {{- else if eq .Values.logflare.backend.type "bigquery" }}
            {{- include "logflare.secretEnv" (dict "root" $ "field" .Values.logflare.secrets.googleServiceAccountJson "envName" "GOOGLE_SERVICE_ACCOUNT" "defaultKey" "GOOGLE_SERVICE_ACCOUNT") | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "logflare.fullname" . }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
