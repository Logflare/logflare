name: Docker Retag Dev Image to Versioned Image
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retag:
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.docker-image.outputs.tag }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Versioned - Merge multi-arch manifests and push (release only)
        run: |
          make tag-versioned
      - id: docker-image
        run: |
          tag="supabase/logflare:$(cat ./VERSION)"
          echo "tag=$tag" >> $GITHUB_OUTPUT

  trigger_cloudbuild:
    uses: ./.github/workflows/trigger-cloudbuild.yml
    needs:
      - retag
    secrets: inherit

  mirror_image:
    runs-on: ubuntu-latest
    needs:
      - retag
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE }}
          aws-region: us-east-1

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.IMAGE_PUSH_GH_CLIENT_ID }}
          private-key: ${{ secrets.IMAGE_PUSH_GH_PRIVATE_KEY }}
          owner: 'supabase'
          repositories: |
            cli
          permission-packages: write

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ECR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: public.ecr.aws
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Mirror image
        env:
          SOURCE_IMAGE: docker.io/${{ needs.retag.outputs.docker_tag }}
          ECR_IMAGE: public.ecr.aws/${{ needs.retag.outputs.docker_tag }}
          GHCR_IMAGE: ghcr.io/${{ needs.retag.outputs.docker_tag }}
        run: |
          docker buildx imagetools create \
            --prefer-index=false \
            -t "$ECR_IMAGE" \
            -t "$GHCR_IMAGE" \
            "$SOURCE_IMAGE"
