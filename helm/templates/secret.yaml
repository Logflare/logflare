{{- if not .Values.logflare.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logflare.fullname" . }}
  labels:
    {{- include "logflare.labels" . | nindent 4 }}
type: Opaque
stringData:
  LOGFLARE_PUBLIC_ACCESS_TOKEN: {{ .Values.logflare.secrets.publicAccessToken | quote }}
  LOGFLARE_PRIVATE_ACCESS_TOKEN: {{ .Values.logflare.secrets.privateAccessToken | quote }}
  DB_PASSWORD: {{ .Values.logflare.secrets.dbPassword | quote }}
  LOGFLARE_DB_ENCRYPTION_KEY: {{ .Values.logflare.secrets.dbEncryptionKey | quote }}
  PHX_SECRET_KEY_BASE: {{ .Values.logflare.secrets.phxSecretKeyBase | quote }}
  PHX_LIVE_VIEW_SIGNING_SALT: {{ .Values.logflare.secrets.phxLiveViewSigningSalt | quote }}
  {{- if eq .Values.logflare.backend.type "postgres" }}
  POSTGRES_BACKEND_URL: {{ .Values.logflare.secrets.postgresBackendUrl | quote }}
  {{- else if eq .Values.logflare.backend.type "bigquery" }}
  GOOGLE_SERVICE_ACCOUNT: {{ .Values.logflare.secrets.googleServiceAccountJson | quote }}
  {{- end }}
{{- end }}
