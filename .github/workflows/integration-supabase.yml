name: Integration Tests with Supabase

on:
  pull_request:
    branches:
      - main
    paths: &watched_paths
      - 'config/**'
      - 'assets/**'
      - 'lib/**'
      - 'priv/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'run.sh'
      - 'test/e2e/supabase/**'
      - '.github/workflows/integration-supabase.yml'
  push:
    branches:
      - main
    paths: *watched_paths

# Cancel old builds on new commit for same workflow + branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: test/e2e/supabase

jobs:
  # Secrets are not available to `if:` at the job level, so resolve once here
  # whether the BigQuery credentials exist and expose it as an output. The test
  # job gates its bigquery matrix legs on this so that runs without the secret
  # (e.g. pull requests from forks) skip BigQuery and stay green.
  check-secrets:
    name: Resolve available secrets
    runs-on: ubuntu-latest
    outputs:
      has_bigquery_creds: ${{ steps.check.outputs.has_bigquery_creds }}
    steps:
    - id: check
      run: echo "has_bigquery_creds=${{ secrets.GCP_E2E_CREDENTIALS != '' }}" >> "$GITHUB_OUTPUT"

  test:
    name: Playwright Tests (${{ matrix.backend }}, ${{ matrix.browsers.name }})
    runs-on: ubuntu-latest
    needs: check-secrets

    strategy:
      fail-fast: false
      matrix:
        backend:
          - postgres
          - bigquery
        browsers:
          - name: Chrome
            project: chromium
          - name: Firefox
            project: firefox
          - name: Safari
            project: webkit

    env:
      BACKEND: ${{ matrix.backend }}
      # The `matrix` context is unavailable in a job-level `if`, so gate each step
      # on this instead. Postgres always runs; BigQuery only runs when the GCP
      # credentials secret is present, so fork PRs (no secret) skip it and stay
      # green rather than failing.
      BACKEND_ENABLED: ${{ matrix.backend == 'postgres' || needs.check-secrets.outputs.has_bigquery_creds == 'true' }}

    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4
      if: env.BACKEND_ENABLED == 'true'

    - name: Set up Docker Buildx
      if: env.BACKEND_ENABLED == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      if: env.BACKEND_ENABLED == 'true'
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build and cache Logflare image
      if: env.BACKEND_ENABLED == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        tags: supabase/logflare:local
        load: true
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        pull: true

    - name: Move Docker cache
      if: env.BACKEND_ENABLED == 'true'
      # Temp fix
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      working-directory: .

    - uses: actions/setup-node@v4
      if: env.BACKEND_ENABLED == 'true'
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: test/e2e/supabase/package-lock.json

    - name: Configure BigQuery credentials
      if: env.BACKEND_ENABLED == 'true' && matrix.backend == 'bigquery'
      env:
        GCP_E2E_CREDENTIALS: ${{ secrets.GCP_E2E_CREDENTIALS }}
        GCP_E2E_PROJECT_NUMBER: ${{ secrets.GCP_E2E_PROJECT_NUMBER }}
      run: |
        printf '%s' "$GCP_E2E_CREDENTIALS" > gcloud.json
        {
          echo "GOOGLE_PROJECT_ID=$(jq -r '.project_id' gcloud.json)"
          echo "GOOGLE_PROJECT_NUMBER=$GCP_E2E_PROJECT_NUMBER"
        } >> "$GITHUB_ENV"

    - name: Setup Supabase services
      if: env.BACKEND_ENABLED == 'true'
      run: bash ./setup-supabase-services.sh

    - name: Install dependencies
      if: env.BACKEND_ENABLED == 'true'
      run: npm ci

    - name: Cache Playwright ${{ matrix.browsers.name }} browser
      if: env.BACKEND_ENABLED == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-${{ hashFiles('test/e2e/supabase/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-

    - name: Install Playwright ${{ matrix.browsers.name }} browser
      if: env.BACKEND_ENABLED == 'true'
      run: npx playwright install ${{ matrix.browsers.project }}

    - name: Install Playwright ${{ matrix.browsers.name }} system deps
      if: env.BACKEND_ENABLED == 'true'
      run: npx playwright install-deps ${{ matrix.browsers.project }}

    - name: Run Playwright tests (only ${{ matrix.browsers.name }})
      if: env.BACKEND_ENABLED == 'true'
      run: npx playwright test --project ${{ matrix.browsers.project }}

    - name: Capture container logs
      if: env.BACKEND_ENABLED == 'true' && failure()
      run: |
        mkdir -p container-logs
        docker ps -a --format '{{.Names}}\t{{.Image}}\t{{.Status}}' > container-logs/_containers.txt
        for c in $(docker ps -a --format '{{.Names}}'); do
          docker logs --timestamps "$c" > "container-logs/${c}.log" 2>&1 || true
        done

    - name: Generate failure summary
      if: env.BACKEND_ENABLED == 'true' && failure()
      run: bash ./ci-failure-summary.sh >> "$GITHUB_STEP_SUMMARY"

    - uses: actions/upload-artifact@v4
      if: env.BACKEND_ENABLED == 'true' && !cancelled()
      with:
        name: playwright-report-${{ matrix.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: env.BACKEND_ENABLED == 'true' && failure()
      with:
        name: container-logs-${{ matrix.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/container-logs/
        retention-days: 30
