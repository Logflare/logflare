name: Integration Tests with Supabase

on:
  pull_request:
    branches:
      - main
    paths: &watched_paths
      - 'config/**'
      - 'assets/**'
      - 'lib/**'
      - 'priv/**'
      - 'mix.exs'
      - 'mix.lock'
      - 'Dockerfile'
      - 'run.sh'
      - 'test/e2e/supabase/**'
      - '.github/workflows/integration-supabase.yml'
  push:
    branches:
      - main
    paths: *watched_paths

# Cancel old builds on new commit for same workflow + branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: test/e2e/supabase

jobs:
  test:
    name: Playwright Tests (${{ matrix.backend }}, ${{ matrix.browsers.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        backend:
          - postgres
        browsers:
          - name: Chrome
            project: chromium
          - name: Firefox
            project: firefox
          - name: Safari
            project: webkit
        # One BigQuery job (the backend choice is invisible to the browser, so
        # a single browser is enough coverage). Added conditionally because it
        # needs repository secrets (GCP service account), which are
        # unavailable to pull requests from forks.
        include: ${{ github.event.pull_request.head.repo.fork != true && fromJSON('[{"backend":"bigquery","browsers":{"name":"Chrome","project":"chromium"}}]') || fromJSON('[]') }}

    timeout-minutes: 60

    env:
      LOGFLARE_BACKEND: ${{ matrix.backend }}
      # Unique per job: BigQuery datasets are named "<user_id><append>", so
      # this isolates concurrent CI runs sharing the GCP project and lets the
      # cleanup step delete the dataset without touching other runs.
      GOOGLE_DATASET_ID_APPEND: _ci_${{ github.run_id }}_${{ github.run_attempt }}_${{ matrix.browsers.project }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build and cache Logflare image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        tags: supabase/logflare:local
        load: true
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        pull: true

    - name: Move Docker cache
      # Temp fix
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      working-directory: .

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: test/e2e/supabase/package-lock.json

    - name: Setup Supabase services
      run: bash ./setup-supabase-services.sh
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GCP_DEV_LOGFLARE_CI_TESTING_SA_KEY }}

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright ${{ matrix.browsers.name }} browser
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-${{ hashFiles('test/e2e/supabase/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ matrix.browsers.project }}-

    - name: Install Playwright ${{ matrix.browsers.name }} browser
      run: npx playwright install ${{ matrix.browsers.project }}

    - name: Install Playwright ${{ matrix.browsers.name }} system deps
      run: npx playwright install-deps ${{ matrix.browsers.project }}

    - name: Run Playwright tests (only ${{ matrix.browsers.name }})
      run: npx playwright test --project ${{ matrix.browsers.project }}

    - name: Capture container logs
      if: failure()
      run: |
        mkdir -p container-logs
        docker ps -a --format '{{.Names}}\t{{.Image}}\t{{.Status}}' > container-logs/_containers.txt
        for c in $(docker ps -a --format '{{.Names}}'); do
          docker logs --timestamps "$c" > "container-logs/${c}.log" 2>&1 || true
        done

    - name: Generate failure summary
      if: failure()
      run: bash ./ci-failure-summary.sh >> "$GITHUB_STEP_SUMMARY"

    - name: Delete BigQuery CI dataset
      if: always() && matrix.backend == 'bigquery'
      continue-on-error: true
      env:
        GOOGLE_PROJECT_ID: logflare-dev-238720
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GCP_DEV_LOGFLARE_CI_TESTING_SA_KEY }}
      run: |
        printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "$RUNNER_TEMP/gcloud.json"
        gcloud auth activate-service-account --key-file="$RUNNER_TEMP/gcloud.json" --quiet
        # Single-tenant mode seeds one user into the freshly migrated
        # database, so the dataset is always "1<append>".
        bq --project_id="$GOOGLE_PROJECT_ID" rm -r -f -d "1${GOOGLE_DATASET_ID_APPEND}"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: container-logs-${{ matrix.backend }}-${{ matrix.browsers.project }}
        path: test/e2e/supabase/container-logs/
        retention-days: 30
