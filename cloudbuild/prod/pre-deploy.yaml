steps:
  # generate the per-cluster container environment metadata
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        umask 077
        {
          printf '%s\n' 'LOGFLARE_GRPC_PORT=50051'
          printf '%s\n' 'LOGFLARE_MIN_CLUSTER_SIZE=2'
          printf 'RELEASE_COOKIE=%s\n' "$$1"
          printf '%s\n' 'LOGFLARE_PUBSUB_POOL_SIZE=32'
          printf 'LOGFLARE_METADATA_CLUSTER=%s\n' "$$2"
          printf 'LOGFLARE_ALERTS_ENABLED=%s\n' "$$3"
        } > gce-container.env
      - --
      - ${_COOKIE}
      - ${_CLUSTER}
      - ${_LOGFLARE_ALERTS_ENABLED}
  # create instance template
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - ./cloudbuild/create-instance-template.sh
      - logflare-232118
      - $_TEMPLATE_NAME
      - --boot-disk-size=10GB
      - --boot-disk-type=pd-balanced
      - --machine-type=c2d-highcpu-32
      - --network-interface=network=global,network-tier=PREMIUM,no-address
      - --maintenance-policy=TERMINATE
      - --service-account=compute-engine-2022@logflare-232118.iam.gserviceaccount.com
      - --scopes=https://www.googleapis.com/auth/cloud-platform
      - --tags=phoenix-http,https-server
      - --metadata-from-file=startup-script=./cloudbuild/gce-startup.sh,shutdown-script=./cloudbuild/shutdown.sh,logflare-container-env=./gce-container.env
      # needed for enabling node-problem-detector, explicitly enable logging
      - --metadata=google-monitoring-enabled=true,google-logging-enabled=true,logflare-container-image=${_CONTAINER_IMAGE}
      - --no-shielded-secure-boot
      - --shielded-vtpm
      - --shielded-integrity-monitoring
      - --image=cos-stable-109-17800-147-54
      - --image-project=cos-cloud


substitutions:
  _CLUSTER: canary
  _COOKIE: default-${_CLUSTER}
  _IMAGE_TAG: $SHORT_SHA
  _TEMPLATE_NAME: logflare-prod-${_NORMALIZED_IMAGE_TAG}-${_CLUSTER}
  _CONTAINER_IMAGE: gcr.io/logflare-232118/logflare_app:${_IMAGE_TAG}
  _LOGFLARE_ALERTS_ENABLED: "false"
timeout: 1800s
options:
  dynamicSubstitutions: true
  substitutionOption: "ALLOW_LOOSE"
