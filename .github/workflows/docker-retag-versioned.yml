name: Docker Retag Dev Image to Versioned Image
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retag:
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.docker-image.outputs.tag }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Versioned - Merge multi-arch manifests and push (release only)
        run: |
          make tag-versioned 
      - id: docker-image
        run: |
          tag="supabase/logflare:$(cat ./VERSION)"
          echo "tag=$tag" >> $GITHUB_OUTPUT

  trigger_cloudbuild:
    uses: ./.github/workflows/trigger-cloudbuild.yml
    needs:
      - retag
    secrets: inherit

  mirror_image:
    runs-on: ubuntu-latest
    needs:
      - retag
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE }}
          aws-region: us-east-1
      - name: Login to ECR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: public.ecr.aws
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror image
        uses: akhilerm/tag-push-action@f35ff2cb99d407368b5c727adbcc14a2ed81d509 # v2.2.0
        with:
          src: docker.io/${{ needs.retag.outputs.docker_tag }}
          dst: |
            public.ecr.aws/${{ needs.retag.outputs.docker_tag }}
            ghcr.io/${{ needs.retag.outputs.docker_tag }}
