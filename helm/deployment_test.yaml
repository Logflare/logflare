suite: test deployment kind
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: should render the correct deployment Kind
    asserts:
      - equal:
          path: kind
          value: Deployment
        template: deployment.yaml

  - it: should reference the chart's ConfigMap via envFrom by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-logflare
        template: deployment.yaml
      - notExists:
          path: spec.template.spec.containers[0].envFrom[1]
        template: deployment.yaml

  - it: should reference no Secrets via envFrom by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-logflare
        template: deployment.yaml
      - notExists:
          path: spec.template.spec.containers[0].envFrom[1]
        template: deployment.yaml

  - it: should reference each Secret in logflare.secretRefs via envFrom
    set:
      logflare.secretRefs:
        - logflare-secrets
        - logflare-db-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-logflare
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: logflare-secrets
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].envFrom[2].secretRef.name
          value: logflare-db-secret
        template: deployment.yaml

  - it: should always render checksum/config annotation
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/config"]
        template: deployment.yaml
      - notExists:
          path: spec.template.metadata.annotations["checksum/secret"]
        template: deployment.yaml

  - it: should inject LOGFLARE_NODE_HOST from the pod IP by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: LOGFLARE_NODE_HOST
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.fieldRef.fieldPath
          value: status.podIP
        template: deployment.yaml

  - it: should use an explicit LOGFLARE_NODE_HOST when set
    set:
      logflare.nodeHost: "my-host"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: LOGFLARE_NODE_HOST
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: "my-host"
        template: deployment.yaml

  - it: should expose http and grpc container ports
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 4000
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 50051
        template: deployment.yaml
