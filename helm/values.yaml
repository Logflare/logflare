# Default values for logflare.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: supabase/logflare
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Logflare single-tenant application configuration.
# Non-sensitive values are rendered into a ConfigMap and wired into the
# Deployment via envFrom. Sensitive values are loaded the same way, in bulk,
# from Secret(s) you manage yourself - see the comment above logflare.secretRefs.
logflare:
  singleTenant: true
  supabaseMode: false

  # Erlang node host, used to build the node name for clustering. When empty,
  # the chart injects the pod IP via the downward API instead of a fixed value.
  nodeHost: ""
  grpcPort: 50051
  httpConnectionPools: "all"
  featureFlagOverride: ""

  phx:
    httpPort: 4000
    urlHost: ""
    urlScheme: "https"
    urlPort: 443
    checkOrigin: false

  # This chart never creates or owns a Secret. List the name(s) of Secret(s)
  # you manage yourself (e.g. materialized by External Secrets Operator, or
  # via `kubectl create secret`) here - every key in each Secret is injected
  # in bulk as an env var, the same way the chart's ConfigMap is. At minimum,
  # most deployments need a Secret containing: LOGFLARE_PUBLIC_ACCESS_TOKEN,
  # LOGFLARE_PRIVATE_ACCESS_TOKEN, DB_PASSWORD, LOGFLARE_DB_ENCRYPTION_KEY,
  # PHX_SECRET_KEY_BASE, PHX_LIVE_VIEW_SIGNING_SALT, and one of
  # POSTGRES_BACKEND_URL (postgres backend) or GOOGLE_SERVICE_ACCOUNT
  # (bigquery backend). See README.md for a full walkthrough.
  secretRefs: []
  # - logflare-secrets

  # Logflare's own metadata Postgres database (distinct from the optional
  # "postgres" event-storage backend below).
  db:
    hostname: ""
    port: 5432
    database: "logflare"
    username: "postgres"
    schema: "public"
    poolSize: 10
    ssl: false

  # Event storage backend. bigquery and postgres are mutually exclusive.
  backend:
    type: bigquery # bigquery | postgres
    bigquery:
      projectId: ""
      projectNumber: ""
      datasetIdAppend: "_prod"
      datasetLocation: "US"
    postgres:
      schema: "public" # POSTGRES_BACKEND_SCHEMA; url (POSTGRES_BACKEND_URL) comes from a Secret in logflare.secretRefs

# External Secrets Operator (ESO) integration. When enabled, the chart renders
# ExternalSecret resources so ESO syncs secrets from your backend (AWS SSM,
# Vault, GCP Secret Manager, etc., resolved via the referenced SecretStore) into
# the Kubernetes Secrets this chart consumes. Requires ESO and its CRDs to be
# installed in the cluster. Off by default: when disabled the chart renders no
# ExternalSecret and you provision the Secrets in logflare.secretRefs yourself.
#
# This is one secret-provider integration. Others (e.g. a HashiCorp Vault Agent
# block) can be added alongside it without changing this one.
externalSecrets:
  enabled: false

  # The (Cluster)SecretStore every generated ExternalSecret references. ESO
  # resolves the actual backend (SSM, Vault, ...) from this store, so the store
  # must already exist in the cluster.
  secretStore:
    # Name of the store. Required when externalSecrets.enabled is true.
    name: ""
    # ClusterSecretStore (cluster-scoped) or SecretStore (namespaced).
    kind: ClusterSecretStore

  # Default re-sync interval for every generated ExternalSecret. Override per
  # entry with secrets[].refreshInterval.
  refreshInterval: 1h

  # ExternalSecrets to generate. Each entry produces one ExternalSecret and, via
  # ESO, one Kubernetes Secret named `name`. Add env-var Secrets to
  # logflare.secretRefs; mount file Secrets via volumes / volumeMounts.
  secrets: []
    # - name: logflare-secrets
    #   # Prepended to each key's remoteRef.key below. Omit for raw keys.
    #   remotePrefix: secret/logflare
    #   # Each key becomes a Secret entry whose key name IS the key, pulled from
    #   # <remotePrefix>/<key>. For env-var Secrets these must match the env vars
    #   # Logflare reads.
    #   keys:
    #     - PHX_SECRET_KEY_BASE
    #     - DB_PASSWORD
    # - name: logflare-cert-files
    #   remotePrefix: secret/logflare
    #   keys:
    #     - db-server-ca.pem
    #     - cert.pem
    #   # Optional per-entry overrides:
    #   # refreshInterval: 30m
    #   # creationPolicy: Owner
    #   # Advanced verbatim passthrough, merged after `keys` (use for bundle
    #   # extraction or custom remoteRef options):
    #   # data:
    #   #   - secretKey: FOO
    #   #     remoteRef: { key: path/to/foo }
    #   # dataFrom:
    #   #   - extract: { key: prod/logflare/bundle }

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 4000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http
# Guards against liveness/readiness killing the pod mid-migration on first boot.
startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
