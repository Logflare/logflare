suite: test external secrets
templates:
  - externalsecret.yaml
tests:
  - it: should render no ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render one ExternalSecret per entry when enabled
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
          kind: ClusterSecretStore
        refreshInterval: 1h
        secrets:
          - name: logflare-secrets
            remotePrefix: secret/logflare
            keys:
              - PHX_SECRET_KEY_BASE
              - DB_PASSWORD
          - name: logflare-cert-files
            remotePrefix: secret/logflare
            keys:
              - db-server-ca.pem
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: ExternalSecret
          apiVersion: external-secrets.io/v1
          name: logflare-secrets
        documentIndex: 0
      - equal:
          path: spec.secretStoreRef.name
          value: my-store
        documentIndex: 0
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
        documentIndex: 0
      - equal:
          path: spec.target.name
          value: logflare-secrets
        documentIndex: 0
      - equal:
          path: spec.target.creationPolicy
          value: Owner
        documentIndex: 0
      - equal:
          path: spec.refreshInterval
          value: 1h
        documentIndex: 0
      - equal:
          path: spec.data[0].secretKey
          value: PHX_SECRET_KEY_BASE
        documentIndex: 0
      - equal:
          path: spec.data[0].remoteRef.key
          value: secret/logflare/PHX_SECRET_KEY_BASE
        documentIndex: 0
      - equal:
          path: metadata.name
          value: logflare-cert-files
        documentIndex: 1
      - equal:
          path: spec.data[0].remoteRef.key
          value: secret/logflare/db-server-ca.pem
        documentIndex: 1

  - it: should use the raw key when remotePrefix is unset
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
        secrets:
          - name: logflare-secrets
            keys:
              - DB_PASSWORD
    asserts:
      - equal:
          path: spec.data[0].remoteRef.key
          value: DB_PASSWORD
        documentIndex: 0

  - it: should default the store kind to ClusterSecretStore
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
        secrets:
          - name: logflare-secrets
            keys:
              - DB_PASSWORD
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
        documentIndex: 0

  - it: should support a SecretStore kind override
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
          kind: SecretStore
        secrets:
          - name: logflare-secrets
            keys:
              - DB_PASSWORD
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore
        documentIndex: 0

  - it: should pass dataFrom through verbatim
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
        secrets:
          - name: logflare-bundle
            dataFrom:
              - extract:
                  key: prod/logflare/bundle
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.dataFrom[0].extract.key
          value: prod/logflare/bundle
        documentIndex: 0

  - it: should fail when enabled but the store name is empty
    set:
      externalSecrets:
        enabled: true
        secrets:
          - name: logflare-secrets
            keys:
              - DB_PASSWORD
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.enabled is true but externalSecrets.secretStore.name is empty; set externalSecrets.secretStore.name to your (Cluster)SecretStore name"

  - it: should fail when an entry has no keys, data, or dataFrom
    set:
      externalSecrets:
        enabled: true
        secretStore:
          name: my-store
        secrets:
          - name: logflare-secrets
    asserts:
      - failedTemplate:
          errorMessage: 'externalSecrets.secrets entry "logflare-secrets" must set at least one of keys, data, or dataFrom'
