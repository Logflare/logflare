name: Elixir CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * SUN'
  pull_request:
    branches: ["**"]
    paths:
      - "lib/**"
      - "config/**"
      - "*.exs"
      - "*.lock"
      - "docs/docs.logflare.com/docs/**"
      - "native/**"
      - "priv/**"
      - "test/**"
      - "!test/e2e/supabase/**"
      # Run suite when this file is changed
      - ".github/workflows/elixir-ci.yml"

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        commands:
          - name: Code Quality - Linting
            run: mix lint
          - name: Code Quality - Formatting
            run: mix test.format
          - name: Compilation Warnings
            run: mix test.compile
          - name: Tests
            # revert once coveralls is fixed
            # run: mix do ecto.create + ecto.migrate + test.coverage.ci
            run: mix do ecto.create + ecto.migrate + test
          # - name: Security - Sobelow Code Scan
          #   run: mix test.security
          - name: Typing check
            run: mix test.typings
    services:
      postgres:
        image: bitnamilegacy/postgresql:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logflare_test
          POSTGRESQL_WAL_LEVEL: logical
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd "pg_isready -d logflare_test -U postgres -p 5432"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: logflare_test
          CLICKHOUSE_USER: logflare
          CLICKHOUSE_PASSWORD: logflare
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --memory="1500m"
          --memory-reservation="512m"
          --cpus="1.0"
          --shm-size="256m"
          --tmpfs /var/lib/clickhouse:rw,size=1G
          --tmpfs /var/log/clickhouse-server:rw,size=100M
    env:
      MIX_ENV: test
      SHELL: /bin/bash
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COVERALLS_SERVICE_JOB_ID: ${{ github.sha }}-${{ strategy.job-index }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
            dialyzer
          key: ${{ runner.os }}-mix-${{  hashFiles('**/mix.lock', '**/Cargo.lock' ) }}
          restore-keys: ${{ runner.os }}-mix--dialyzer
      - name: Install dependencies
        run: mix do deps.get, deps.compile
      - name: Run ${{ matrix.commands.name }}
        run: ${{ matrix.commands.run }}
